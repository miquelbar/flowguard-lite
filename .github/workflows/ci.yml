name: CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  native-test:
    name: Native Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Check Formatting
        run: go fmt ./... && git diff --exit-code

      - name: Go Vet
        run: go vet ./...

      - name: Run Go Unit Tests
        run: go test -v -race -coverprofile=coverage.out ./...

  docker-build:
    name: Docker Image Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          tags: flowguard:test
          outputs: type=docker,dest=/tmp/flowguard.tar

      - name: Verify Exported Image
        run: |
          docker load --input /tmp/flowguard.tar
          docker run --rm flowguard:test --help || true
