version: '3.8'

services:
  benchmark-2g:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.benchmark
    volumes:
      - ..:/work
    working_dir: /work
    deploy:
      resources:
        limits:
          memory: 2g
    environment:
      - FLOWGUARD_BENCH_MEM_LIMIT=2GB
    command: go run cmd/benchrunner/main.go -suffix=2g

  benchmark-4g:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.benchmark
    volumes:
      - ..:/work
    working_dir: /work
    deploy:
      resources:
        limits:
          memory: 4g
    environment:
      - FLOWGUARD_BENCH_MEM_LIMIT=4GB
    command: go run cmd/benchrunner/main.go -suffix=4g

  benchmark-8g:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.benchmark
    volumes:
      - ..:/work
    working_dir: /work
    deploy:
      resources:
        limits:
          memory: 8g
    environment:
      - FLOWGUARD_BENCH_MEM_LIMIT=8GB
    command: go run cmd/benchrunner/main.go -suffix=8g
