version: '3.8'

services:
  benchmark-1c-2g:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.benchmark
    volumes:
      - ..:/work
    working_dir: /work
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2g
    environment:
      - FLOWGUARD_BENCH_MEM_LIMIT=2GB
    command: go run cmd/benchrunner/main.go -suffix=1c-2g

  benchmark-1c-4g:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.benchmark
    volumes:
      - ..:/work
    working_dir: /work
